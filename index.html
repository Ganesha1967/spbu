<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>📚 Конспекты СПбГУ ПИ</title>
  <link rel="stylesheet" href="assets/style.css">
</head>
<body>
  <div class="page-cover"></div>

  <main class="container">
    <nav class="breadcrumbs">
      <span class="breadcrumb-item">Конспекты ПИ</span>
      <span class="breadcrumb-separator">/</span>
      <span id="current-breadcrumb" class="breadcrumb-item">1 Семестр</span>
    </nav>

    <header class="page-header">
      <div class="page-icon">📚</div>
      <h1 class="page-title">Конспекты СПбГУ ПИ</h1>
    </header>

    <nav class="notion-nav">
      <button onclick="showSemester('sem-1')" id="btn-sem-1" class="nav-item active">1 Семестр</button>
      <button onclick="showSemester('sem-2')" id="id-sem-2" class="nav-item">2 Семестр</button>
      <a href="https://github.com/ganesha1967/spbu" target="_blank" class="nav-item">GitHub</a>
    </nav>

    <div id="sem-1" class="semester-page active">
      <section class="notion-section">
        <h2 class="notion-h2">🎓 1 Семестр</h2>
        <div class="notion-list">
          <a href="docs/sem-1/matan/matan-1.pdf" target="_blank" class="notion-row">
            <span class="row-icon">📂</span>
            <span class="row-text">Математический анализ</span>
            <span class="row-tag blue">PDF</span>
          </a>
          <a href="docs/sem-1/diskra/diskra-1.pdf" target="_blank" class="notion-row">
            <span class="row-icon">📂</span>
            <span class="row-text">Дискретная математика</span>
            <span class="row-tag orange">PDF</span>
          </a>
          <a href="docs/sem-1/algebra/algebra-1.pdf" target="_blank" class="notion-row">
            <span class="row-icon">📂</span>
            <span class="row-text">Алгебра</span>
            <span class="row-tag purple">PDF</span>
          </a>
        </div>
      </section>
    </div>

    <div id="sem-2" class="semester-page">
      <section class="notion-section">
        <h2 class="notion-h2">🎓 2 Семестр</h2>
        <div class="notion-list">
          <div class="notion-row disabled">
            <span class="row-icon">⏳</span>
            <span class="row-text">Алгоритмы и СД</span>
            <span class="row-tag gray">В процессе</span>
          </div>
          </div>
      </section>
    </div>
  </main>

  <script>
    function showSemester(semId) {
      document.querySelectorAll('.semester-page').forEach(p => p.classList.remove('active'));
      document.getElementById(semId).classList.add('active');
      document.querySelectorAll('.nav-item').forEach(btn => btn.classList.remove('active'));
      event?.target?.classList?.add('active');
      const breadcrumb = document.getElementById('current-breadcrumb');
      breadcrumb.innerText = semId === 'sem-1' ? '1 Семестр' : '2 Семестр';
    }
  </script>
</body>
</html>
