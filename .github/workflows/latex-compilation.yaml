name: Build PDFs from LaTeX sources

on:
  push:
    branches: [ "main", "feature/compile-with-github-actions" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Set up Git repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Compile only new or changed LaTeX files
        uses: docker://ghcr.io/xu-cheng/texlive-full:latest
        with:
          args: |
            /bin/bash -c "
            set -e

            find . -name '*.tex' -not -path '*/.*' | while read -r file; do
              pdf_file=\"\${file%.tex}.pdf\"

              changed=false
              if git diff --name-only HEAD^ HEAD | grep -q \"\$file\"; then
                changed=true
              fi

              if [ \"\$changed\" = false ] && [ -f \"\$pdf_file\" ] && [ \"\$pdf_file\" -nt \"\$file\" ]; then
                echo \"Skipping \$file (up to date)\"
                continue
              fi

              echo \"Compiling \$file...\"

              dir=\$(dirname \"\$file\")
              base=\$(basename \"\$file\")

              cd \"\$dir\"

              pdflatex -interaction=nonstopmode -shell-escape \"\$base\"
              pdflatex -interaction=nonstopmode -shell-escape \"\$base\"

              cd - > /dev/null
            done
            "

      - name: Commit and push compiled PDFs
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          git add -f **/*.pdf
          
          if git diff --staged --quiet; then
            echo "No changes in PDFs to commit"
            exit 0
          fi
          
          git commit -m 'chore(ci): update PDFs [skip ci]'
          git push
          