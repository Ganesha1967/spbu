name: Build PDFs from LaTeX sources

on:
  push:
    branches: [ "main", "feature/compile-with-github-actions" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

steps:
    - name: Set up Git repository
      uses: actions/checkout@v4 

    - name: Compile all LaTeX files
      uses: docker://ghcr.io/xu-cheng/texlive-full:latest
      with:
        args: |
          /bin/bash -c "
          find . -name '*.tex' -not -path '*/.*' | while read -r file; do
            echo 'Compiling $file...'
            dir=$(dirname \"$file\")
            base=$(basename \"$file\")
            cd - > /dev/null
          done
          "

    - name: Commit and push compiled PDFs
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        git add -f **/*.pdf
        
        if git diff --staged --quiet; then
          echo "No changes in PDFs to commit"
          exit 0
        fi
        
        git commit -m 'chore(ci): update compiled PDFs [skip ci]'
        git push